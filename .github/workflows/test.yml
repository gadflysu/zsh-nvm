name: Tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install zsh (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y zsh

      - name: Remove system node (macOS)
        if: runner.os == 'macOS'
        run: |
          brew uninstall --force node || true
          sudo rm -rf "$(brew --prefix)/bin/node" "$(brew --prefix)/bin/npm" "$(brew --prefix)/bin/npx" || true

      - name: Remove system node (Linux)
        if: runner.os == 'Linux'
        run: sudo rm -rf /usr/local/{lib/node{,/.npm,_modules},bin,share/man}/{npm*,node*,man1/node*} || true

      - name: Install urchin
        run: |
          mkdir /tmp/urchin && cd /tmp/urchin
          url=$(curl -s https://registry.npmjs.com/urchin | grep -Eo '"tarball":\s*"[^"]+"' | tail -n 1 | awk -F\" '{ print $4 }')
          curl -s "$url" -O
          tar -xf urchin*
          chmod +x package/urchin

      - name: Run tests
        run: /tmp/urchin/package/urchin -s zsh tests
